services:
  - type: web
    name: cybershield-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false   # Set this manually in the Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this manually in the Render dashboard
